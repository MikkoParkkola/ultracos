# osv-scanner allowlist — the pressure valve for the CI dependency-vuln gate.
#
# The gate (`.github/workflows/ci.yml` `osv-scan` job) fails the build on ANY
# known, FIXABLE vulnerability in the dependency tree, on every PR and push.
# A security fix then lands with the change that introduces (or fails to bump
# past) it — not weeks later.
#
# Scope (verified by local run 2026-06-05): Cargo crates — osv-scanner reads
# glyphdown-core/Cargo.lock and checks every dependency against the OSV
# database. NOT covered: github-actions advisories (our actions are SHA-pinned,
# which is itself the mitigation, and osv-scanner does not map SHA pins to
# advisory versions) and Docker base-image OS-layer CVEs (glyphdown ships no
# container image, so there is no image layer to scan). This covers the
# primary attack surface: the Rust crate dependency tree.
#
# Failing on any fixable vuln is intentional: a new build must include the
# security fixes that are available. The right fix for a fixable vuln is to
# bump the dependency (cargo update -p <crate>), not to ignore it.
#
# When a vulnerability has NO upstream fix yet, or is verified unreachable, it
# would otherwise block every build indefinitely. Add a time-boxed exception
# here instead of weakening the gate. Each entry MUST carry a reason and an
# ignoreUntil review date — expired entries re-trigger the gate automatically.
#
# Format (https://google.github.io/osv-scanner/configuration/):
#
#   [[IgnoredVulns]]
#   id = "RUSTSEC-2024-1234"
#   ignoreUntil = 2026-07-01   # review by this date; after it the gate fires again
#   reason = "No patched release upstream yet; unreachable. Reviewed 2026-06-05 by <who>."
#
# Keep this list EMPTY unless a vuln genuinely has no fix. The right fix for a
# fixable vuln is to bump the dependency, not to ignore it.
